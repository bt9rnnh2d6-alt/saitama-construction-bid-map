function bold(e) {
	var obj=e.parentNode; 
    while(obj!=null){ 
        if(obj.tagName.toLowerCase()=='td'){ 
        	obj.style.font = "bold";
        	break; 
        } 
        obj=obj.parentNode; 
    } 
}
